<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidang Maaf Lebaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #064e3b;
            color: #f3f4f6;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #065f46 0%, #064e3b 100%);
        }

        .btn-option {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
        }

        .btn-option:hover {
            background: #fbbf24;
            color: #064e3b;
            transform: scale(1.02);
        }

        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 6px;
            background: #fbbf24;
            transition: width 0.4s ease;
            z-index: 100;
        }

        .summary-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            text-align: left;
            font-size: 0.9rem;
            margin: 15px 0;
            border-left: 4px solid #fbbf24;
        }

        .arabic { font-family: 'Amiri', serif; font-size: 3.5rem; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="progress-bar" id="bar" style="width: 10%"></div>
    <canvas id="canvas"></canvas>

    <div id="main-card" class="glass">
        <!-- Content injected by JS -->
    </div>

    <script>
        const apiKey = "";
        let currentStep = 1;
        let userResponses = [];

        const story = {
            1: {
                q: "Assalamu'alaikum! Sebelum lebaran, kita 'sidang' bentar ya? Siap?",
                options: [
                    { t: "Siap, laksanakan!", next: 2 },
                    { t: "Aduh, deg-degan nih..", next: 2 }
                ]
            },
            2: {
                q: "Jujur ya, selama ini aku orangnya gimana di mata kamu?",
                options: [
                    { t: "Asik tapi kadang nyebelin", next: 3 },
                    { t: "Baik banget kayak malaikat", next: 3 }
                ]
            },
            3: {
                q: "Kalo aku bikin salah, biasanya kamu tipe yang mana?",
                options: [
                    { t: "Langsung maafin kok", next: 4 },
                    { t: "Ngambek dulu dikit biar dicariin", next: 4 }
                ]
            },
            4: {
                q: "Hal apa dari aku yang paling perlu dimaafkan?",
                options: [
                    { t: "Bercandaan yang kuli", next: 5 },
                    { t: "Chat yang sering di-read doang", next: 5 }
                ]
            },
            5: {
                q: "Nah, sekarang momen penentuan. Kamu ikhlas lahir batin maafin aku?",
                options: [
                    { t: "Ikhlas lahir batin!", next: 6 },
                    { t: "Iya, tapi ada syaratnya..", next: 6 }
                ]
            },
            6: {
                q: "Makasih ya! Btw, lebaran nanti rencana mau ngapain aja?",
                options: [
                    { t: "Makan ketupat sampe kenyang", next: 7 },
                    { t: "Berburu THR ke rumah saudara", next: 7 }
                ]
            },
            7: {
                q: "Kalo ketemu aku nanti, mau bilang apa pertama kali?",
                options: [
                    { t: "Minal Aidin wal Faizin!", next: 8 },
                    { t: "Mana nastarnya?!", next: 8 }
                ]
            },
            8: {
                q: "Apa harapan kamu buat pertemanan kita kedepannya?",
                options: [
                    { t: "Makin akrab & kompak", next: 9 },
                    { t: "Jangan bosen sama aku ya", next: 9 }
                ]
            },
            9: {
                q: "Oke, sidang hampir selesai. Satu kata buat Idul Fitri tahun ini?",
                options: [
                    { t: "Berkah", next: 10 },
                    { t: "Bahagia", next: 10 }
                ]
            },
            10: {
                q: "Siap melihat rangkuman sidang kamu dan kejutan akhirnya?",
                options: [
                    { t: "LIHAT HASIL & UCAPAN 🎁", next: "FINAL" }
                ]
            }
        };

        function render() {
            const card = document.getElementById('main-card');
            const data = story[currentStep];
            if (!data) return;

            document.getElementById('bar').style.width = (currentStep / 10 * 100) + '%';
            
            card.innerHTML = `
                <div class="text-5xl mb-4">🌙</div>
                <h2 class="text-xl font-bold mb-6">${data.q}</h2>
                <div id="btns"></div>
            `;

            data.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-option';
                b.innerText = opt.t;
                b.onclick = () => {
                    userResponses.push({ step: currentStep, question: data.q, answer: opt.t });
                    if (opt.next === "FINAL") {
                        showFinal();
                    } else {
                        currentStep = opt.next;
                        render();
                    }
                };
                document.getElementById('btns').appendChild(b);
            });
        }

        async function showFinal() {
            const card = document.getElementById('main-card');
            card.style.maxWidth = "600px";
            
            let summaryText = "*LAPORAN HASIL SIDANG MAAF LEBARAN* 📜\n\n";
            userResponses.forEach((r, i) => {
                summaryText += `${i+1}. ${r.question} -> *${r.answer}*\n`;
            });
            summaryText += "\nStatus: *SUDAH DIMAAFKAN LAHIR BATIN* ✅";

            card.innerHTML = `
                <div class="arabic">عيد مبارك</div>
                <h1 class="text-3xl font-bold text-white mb-2">Selamat Idul Fitri 1447 H</h1>
                <p class="text-sm text-yellow-200 mb-4 italic">"Taqabbalallahu minna wa minkum"</p>
                
                <div class="summary-box">
                    <p class="font-bold text-yellow-400 mb-2">Rangkuman Jawabanmu:</p>
                    <div class="max-h-40 overflow-y-auto pr-2 text-xs space-y-1 text-gray-300">
                        ${userResponses.map(r => `<p>• ${r.answer}</p>`).join('')}
                    </div>
                </div>

                <div class="flex flex-col gap-3 mt-4">
                    <button onclick="copySummary('${summaryText.replace(/'/g, "\\'")}')" class="btn-option bg-yellow-500 text-green-900">
                        📋 Salin Rangkuman & Balas ke WA
                    </button>
                    <button onclick="copyLink()" class="btn-option border-yellow-500 text-yellow-500">
                        📤 Bagikan Web Ini
                    </button>
                </div>
            `;
            
            startFireworks();
            playVocal();
        }

        function copySummary(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Rangkuman berhasil disalin! Silakan paste ke chat WA temanmu sebagai bukti.");
        }

        function copyLink() {
            const el = document.createElement('textarea');
            el.value = window.location.href;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Link web disalin!");
        }

        async function playVocal() {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Say warmly: Alhamdulillah, sidang telah usai. Selamat hari raya Idul Fitri, mohon maaf lahir dan batin ya!" }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } } }
                        }
                    })
                });
                const res = await response.json();
                const data = res.candidates[0].content.parts[0].inlineData.data;
                const blob = new Blob([Uint8Array.from(atob(data), c => c.charCodeAt(0))], {type: 'audio/wav'});
                new Audio(URL.createObjectURL(blob)).play();
            } catch (e) {}
        }

        // --- Fireworks Animation ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.v = { x: (Math.random()-0.5)*12, y: (Math.random()-0.5)*12 };
                this.a = 1;
            }
            draw() {
                ctx.globalAlpha = this.a;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                this.x += this.v.x; this.y += this.v.y;
                this.v.x *= 0.96; this.v.y *= 0.96;
                this.a -= 0.015;
            }
        }

        function createF(x, y) {
            const cols = ['#fbbf24', '#ffffff', '#34d399', '#60a5fa'];
            const c = cols[Math.floor(Math.random()*cols.length)];
            for(let i=0; i<40; i++) particles.push(new Particle(x, y, c));
        }

        function startFireworks() {
            setInterval(() => createF(Math.random()*canvas.width, Math.random()*canvas.height*0.5), 800);
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(6, 78, 59, 0.2)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                if(p.a > 0) { p.update(); p.draw(); }
                else particles.splice(i, 1);
            });
        }

        window.addEventListener('mousedown', (e) => {
            if (currentStep === "FINAL" || document.querySelector('.arabic')) createF(e.clientX, e.clientY);
        });

        window.onload = () => { render(); animate(); };
    </script>
</body>
</html>
